<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aleo 私密计数器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .counter-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .counter-value {
            font-size: 5rem;
            font-weight: bold;
            color: #00dbde;
            text-shadow: 0 0 20px rgba(0, 219, 222, 0.5);
        }

        .counter-label {
            color: #aaa;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .privacy-badge {
            display: inline-block;
            background: rgba(0, 219, 222, 0.2);
            color: #00dbde;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 219, 222, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.9rem;
            color: #aaa;
        }

        .status.success {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .status.error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .status.loading {
            color: #ffd93d;
            background: rgba(255, 217, 61, 0.1);
        }

        .info-section {
            margin-top: 30px;
            text-align: left;
        }

        .info-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00dbde;
        }

        .info-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .info-item label {
            display: block;
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .info-item span {
            font-family: 'Courier New', monospace;
            word-break: break-all;
            color: #fff;
        }

        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .counter-value {
                font-size: 3.5rem;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 私密计数器</h1>
        <p class="subtitle">基于 Aleo 零知识证明的隐私保护应用</p>
        
        <div class="counter-display">
            <div class="counter-value" id="counterValue">--</div>
            <div class="counter-label">当前计数（仅您可见）</div>
            <div class="privacy-badge">🛡️ 链上数据已加密</div>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-primary" id="btnMint" onclick="mintCounter()">
                创建计数器
            </button>
            <button class="btn btn-secondary" id="btnIncrement" onclick="incrementCounter()" disabled>
                +1 增加
            </button>
            <button class="btn btn-secondary" id="btnGetValue" onclick="getValue()" disabled>
                查看数值
            </button>
        </div>
        
        <div class="status" id="status">
            准备就绪，请先创建计数器
        </div>
        
        <div class="info-section">
            <div class="info-title">📋 应用信息</div>
            <div class="info-item">
                <label>程序名称</label>
                <span>counter_app.aleo</span>
            </div>
            <div class="info-item">
                <label>网络</label>
                <span>Aleo Testnet</span>
            </div>
            <div class="info-item">
                <label>功能说明</label>
                <span>创建私密计数器、增加计数、查看数值（所有操作均在链下执行，仅提交零知识证明）</span>
            </div>
        </div>
        
        <div class="footer">
            Powered by Aleo ZK Technology | Aleo 101 Bootcamp
        </div>
    </div>

    <script>
        // 模拟应用状态
        let counterState = {
            exists: false,
            value: 0,
            isPrivate: true
        };

        // 更新界面显示
        function updateUI() {
            const counterValue = document.getElementById('counterValue');
            const btnIncrement = document.getElementById('btnIncrement');
            const btnGetValue = document.getElementById('btnGetValue');
            
            if (counterState.exists) {
                counterValue.textContent = counterState.isPrivate ? '***' : counterState.value;
                btnIncrement.disabled = false;
                btnGetValue.disabled = false;
            } else {
                counterValue.textContent = '--';
                btnIncrement.disabled = true;
                btnGetValue.disabled = true;
            }
        }

        // 更新状态消息
        function setStatus(message, type = '') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status';
            if (type) {
                status.classList.add(type);
            }
        }

        // 模拟创建计数器
        async function mintCounter() {
            setStatus('正在创建计数器...', 'loading');
            
            // 模拟交易延迟
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            counterState.exists = true;
            counterState.value = 0;
            
            updateUI();
            setStatus('✅ 计数器创建成功！您的私密计数器已生成。', 'success');
        }

        // 模拟增加计数
        async function incrementCounter() {
            if (!counterState.exists) {
                setStatus('请先创建计数器', 'error');
                return;
            }
            
            setStatus('正在生成零知识证明...', 'loading');
            
            // 模拟证明生成延迟
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            counterState.value += 1;
            
            updateUI();
            setStatus(`✅ 计数已增加！当前值：${counterState.value}（仅您可见）`, 'success');
        }

        // 模拟查看数值
        async function getValue() {
            if (!counterState.exists) {
                setStatus('请先创建计数器', 'error');
                return;
            }
            
            setStatus('正在解密数据...', 'loading');
            
            // 模拟解密延迟
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // 临时显示真实值
            counterState.isPrivate = false;
            updateUI();
            
            setStatus(`🔓 当前计数值：${counterState.value}`, 'success');
            
            // 3秒后重新隐藏
            setTimeout(() => {
                counterState.isPrivate = true;
                updateUI();
                setStatus('数值已重新加密保护', '');
            }, 3000);
        }

        // 初始化
        updateUI();
    </script>
</body>
</html>
